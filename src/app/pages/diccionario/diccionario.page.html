<app-header-app titulo="Diccionario (A-Z)"></app-header-app>

<ion-content>
  <div class="center-container ion-padding">
    <div class="ion-text-center ion-margin-bottom">
      <h3 style="color: var(--ion-color-primary-shade); font-weight: 900; font-size: 1.8rem; margin-bottom: 5px;">Abecedario</h3>
      <p style="color: var(--ion-color-medium); margin-top: 0; font-size: 1.1rem;">Aprende todas las señas</p>
    </div>

    <ion-grid>
      <ion-row>
        <ion-col size="6" size-md="4" size-lg="3" *ngFor="let item of letras">
          <ion-card class="animate-fade-in" style="border-radius: 15px; text-align: center; background: white; padding: 10px;">
            <img [src]="item.imagenUrl" style="width: 100%; height: 120px; object-fit: contain;" />
            <ion-card-header style="padding: 10px 5px 0 5px;">
              <ion-card-title style="font-size: 1.5rem; font-weight: bold; color: var(--ion-color-primary);">{{ item.letra }}</ion-card-title>
            </ion-card-header>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
