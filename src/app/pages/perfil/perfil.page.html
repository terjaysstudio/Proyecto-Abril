<app-header-app titulo="Tu Perfil"></app-header-app>

<ion-content>
  <div class="center-container ion-padding">
    <div class="ion-text-center animate-fade-in delay-1" style="margin-top: 20px;">
      <!-- Icono de usuario o avatar simple -->
      <div style="background-color: var(--ion-color-secondary); width: 110px; height: 110px; border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(112, 196, 255, 0.4); border: 4px solid white;">
        <span style="font-size: 3.5rem; color: white;">👤</span>
      </div>
    </div>

    <ion-card class="ion-margin-top animate-slide-up delay-2" style="border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);">
      <ion-card-header>
        <ion-card-title class="ion-text-center" style="color: var(--ion-color-primary-shade); font-weight: 900; font-size: 1.5rem;">Mis Estadísticas</ion-card-title>
      </ion-card-header>
      <ion-card-content class="ion-text-center">
        <h2 style="font-size: 1.8rem; font-weight: 800; color: var(--ion-color-dark); margin-bottom: 20px;">{{ nombre }}</h2>
        
        <div style="background-color: var(--ion-color-primary-tint); padding: 20px; border-radius: 20px; margin-top: 15px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);">
          <h3 style="color: var(--ion-color-primary-shade); font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 1px; font-size: 1rem;">Puntos Totales</h3>
          <span style="font-size: 3.5rem; font-weight: 900; color: var(--ion-color-primary);">{{ puntajeFirebase }}</span>
          <p style="margin: 0; color: var(--ion-color-medium); font-size: 0.9rem; font-weight: 600;">(Guardado en la Nube ☁️)</p>
        </div>
      </ion-card-content>
    </ion-card>

    <ion-button expand="block" shape="round" color="medium" fill="outline" (click)="volver()" class="ion-margin-top animate-fade-in delay-3" style="height: 55px; font-weight: bold; border-width: 2px;">
      Regresar al Inicio
    </ion-button>
  </div>
</ion-content>
